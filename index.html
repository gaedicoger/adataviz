<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adataviz</title>
  </head>
  <body>
    <header>
      <h1>Adataviz</h1>
      <h2>🌳 Découvre le patrimoine arboré de Nantes et sa métropole !</h2>
    </header>
    <div id="app">
      <form id="search-form">
        <div id="search-content">
          <input
            type="text"
            id="search-bar"
            name="search-bar"
            required
            placeholder="Renseigner la commune"
          />
          <button type="submit" id="search">
            <img id="search-icone" src="./img/icons8-loupe-100.png" />
          </button>
          <div id="toggle-map-container">
            <button type="button" id="toggle-map">🗺️ Afficher la carte</button>
          </div>
        </div>
      </form>
      <div id="map" class="hidden" style="height: 50vh"></div>
      <div id="cards-content"></div>
      <div id="buttons-pages">
        <button type="button" id="button-load">➕ Charger plus</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  </body>
</html>
