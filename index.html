<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adataviz</title>
  </head>
  <body>
    <header>
      <h1>Adataviz</h1>
      <h2>🌳 Découvre le patrimoine arboré de Nantes et sa métropole !</h2>
    </header>
    <div id="app">
      <form id="search-form">
        <div id="search-content">
          <input
            type="text"
            id="search-bar"
            name="search-bar"
            required
            placeholder="Renseigner la commune"
          />
          <button type="submit" id="search">
            <img id="search-icone" src="./img/icons8-loupe-100.png" />
          </button>
          <div id="toggle-map-container">
            <button type="button" id="toggle-map">🗺️ Afficher la carte</button>
          </div>
        </div>
      </form>
      <iframe
        id="map-iframe"
        class="hidden"
        src="https://data.nantesmetropole.fr/explore/embed/dataset/244400404_patrimoine-arbore-nantes-metropole/map/?disjunctive.variete&disjunctive.lib_genre&disjunctive.lib_espece&disjunctive.lib_hauteur_totale&disjunctive.lib_stade_developpement&disjunctive.classe_age&disjunctive.statut&disjunctive.nom&disjunctive.annee_plantation&sort=annee_plantation&location=10,47.22885,-1.6526&basemap=jawg.streets&static=false&datasetcard=false&scrollWheelZoom=false"
        frameborder="0"
      ></iframe>
      <div id="cards-content"></div>
      <div id="buttons-pages">
        <button type="button" id="button-load">➕ Charger plus</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
